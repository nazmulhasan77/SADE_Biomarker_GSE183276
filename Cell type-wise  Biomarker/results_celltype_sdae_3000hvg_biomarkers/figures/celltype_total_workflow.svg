<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 38px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 20; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; }
      .data { fill: #e0f2fe; stroke: #0369a1; }
      .filter { fill: #dcfce7; stroke: #15803d; }
      .prep { fill: #ffedd5; stroke: #c2410c; }
      .model { fill: #ede9fe; stroke: #6d28d9; }
      .eval { fill: #fef3c7; stroke: #b45309; }
      .bio { fill: #fee2e2; stroke: #b91c1c; }
      .out { fill: #f1f5f9; stroke: #475569; }
      .label { font: 700 21px Arial, sans-serif; fill: #111827; }
      .text { font: 400 16px Arial, sans-serif; fill: #334155; }
      .small { font: 400 14px Arial, sans-serif; fill: #475569; }
      .mono { font: 600 14px Consolas, monospace; fill: #0f172a; }
      .stage { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #1f2937; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1200"/>
  <text class="title" x="900" y="58" text-anchor="middle">Total Workflow: Cell Type-wise SDAE Biomarker Discovery</text>
  <text class="subtitle" x="900" y="90" text-anchor="middle">Notebook: SDAE_GSE183276_celltype_balanced_3000HVG_biomarker.ipynb</text>

  <rect class="band" x="55" y="125" width="1690" height="170"/>
  <text class="stage" x="85" y="155">1. Dataset and Metadata</text>
  <rect class="box data" x="95" y="178" width="330" height="88"/>
  <text class="label" x="260" y="210" text-anchor="middle">Load GSE183276</text>
  <text class="mono" x="260" y="238" text-anchor="middle">109,741 cells x 37,080 genes</text>
  <rect class="box data" x="505" y="178" width="330" height="88"/>
  <text class="label" x="670" y="210" text-anchor="middle">Read Metadata</text>
  <text class="mono" x="670" y="238" text-anchor="middle">condition.l1 + subclass.l1</text>
  <rect class="box filter" x="915" y="178" width="330" height="88"/>
  <text class="label" x="1080" y="210" text-anchor="middle">Target Conditions</text>
  <text class="mono" x="1080" y="238" text-anchor="middle">AKI, CKD, Ref</text>
  <rect class="box filter" x="1325" y="178" width="330" height="88"/>
  <text class="label" x="1490" y="210" text-anchor="middle">Target Cell Types</text>
  <text class="mono" x="1490" y="238" text-anchor="middle">PT TAL IMM EC IC PC CNT DCT</text>
  <path class="arrow" d="M425 222 H505"/>
  <path class="arrow" d="M835 222 H915"/>
  <path class="arrow" d="M1245 222 H1325"/>

  <rect class="band" x="55" y="330" width="1690" height="215"/>
  <text class="stage" x="85" y="360">2. Cell Type-wise Processing Loop</text>
  <rect class="box filter" x="95" y="388" width="290" height="112"/>
  <text class="label" x="240" y="420" text-anchor="middle">Split by Cell Type</text>
  <text class="text" x="125" y="450">One independent run for each</text>
  <text class="small" x="125" y="477">cell type subset</text>
  <rect class="box prep" x="450" y="388" width="300" height="112"/>
  <text class="label" x="600" y="420" text-anchor="middle">Balance Classes</text>
  <text class="text" x="480" y="450">Equal AKI / CKD / Ref cells</text>
  <text class="small" x="480" y="477">Ref count or minimum count</text>
  <rect class="box prep" x="815" y="388" width="300" height="112"/>
  <text class="label" x="965" y="420" text-anchor="middle">Select HVGs</text>
  <text class="text" x="845" y="450">Variance-based top genes</text>
  <text class="mono" x="845" y="477">3000 HVGs per cell type</text>
  <rect class="box prep" x="1180" y="388" width="300" height="112"/>
  <text class="label" x="1330" y="420" text-anchor="middle">Standardize Features</text>
  <text class="text" x="1210" y="450">StandardScaler applied after</text>
  <text class="small" x="1210" y="477">HVG selection for stable training</text>
  <rect class="box prep" x="1545" y="388" width="155" height="112"/>
  <text class="label" x="1622" y="420" text-anchor="middle">Split</text>
  <text class="text" x="1572" y="450">Train</text>
  <text class="text" x="1572" y="475">Val</text>
  <text class="text" x="1572" y="500">Test</text>
  <path class="arrow" d="M385 444 H450"/>
  <path class="arrow" d="M750 444 H815"/>
  <path class="arrow" d="M1115 444 H1180"/>
  <path class="arrow" d="M1480 444 H1545"/>

  <rect class="band" x="55" y="580" width="1690" height="255"/>
  <text class="stage" x="85" y="610">3. Supervised Denoising Autoencoder Training</text>
  <rect class="box model" x="100" y="650" width="260" height="120"/>
  <text class="label" x="230" y="682" text-anchor="middle">Noisy Input</text>
  <text class="mono" x="230" y="712" text-anchor="middle">gene masking p = 0.2</text>
  <text class="small" x="230" y="740" text-anchor="middle">training time only</text>
  <rect class="box model" x="430" y="650" width="300" height="120"/>
  <text class="label" x="580" y="682" text-anchor="middle">Encoder</text>
  <text class="mono" x="580" y="712" text-anchor="middle">3000 -> 512 -> 128 -> 32</text>
  <text class="small" x="580" y="740" text-anchor="middle">BatchNorm + ReLU + Dropout</text>
  <rect class="box model" x="800" y="650" width="230" height="120"/>
  <text class="label" x="915" y="682" text-anchor="middle">Latent Space</text>
  <text class="mono" x="915" y="712" text-anchor="middle">z = 32</text>
  <text class="small" x="915" y="740" text-anchor="middle">compact representation</text>
  <rect class="box model" x="1100" y="625" width="270" height="95"/>
  <text class="label" x="1235" y="657" text-anchor="middle">Decoder</text>
  <text class="mono" x="1235" y="687" text-anchor="middle">32 -> 128 -> 512 -> 3000</text>
  <rect class="box model" x="1100" y="740" width="270" height="95"/>
  <text class="label" x="1235" y="772" text-anchor="middle">Classifier</text>
  <text class="mono" x="1235" y="802" text-anchor="middle">32 -> 64 -> 3 classes</text>
  <rect class="box eval" x="1450" y="650" width="235" height="120"/>
  <text class="label" x="1568" y="682" text-anchor="middle">Joint Loss</text>
  <text class="mono" x="1568" y="712" text-anchor="middle">MSE + CrossEntropy</text>
  <text class="small" x="1568" y="740" text-anchor="middle">reconstruction + class prediction</text>
  <path class="arrow" d="M360 710 H430"/>
  <path class="arrow" d="M730 710 H800"/>
  <path class="arrow" d="M1030 700 H1100"/>
  <path class="arrow" d="M1030 725 H1100"/>
  <path class="arrow" d="M1370 680 H1450"/>
  <path class="arrow" d="M1370 792 H1450"/>

  <rect class="band" x="55" y="870" width="1690" height="205"/>
  <text class="stage" x="85" y="900">4. Evaluation, Interpretation, and Biomarker Ranking</text>
  <rect class="box eval" x="100" y="930" width="270" height="105"/>
  <text class="label" x="235" y="962" text-anchor="middle">Model Evaluation</text>
  <text class="text" x="130" y="993">Accuracy, macro F1</text>
  <text class="small" x="130" y="1018">confusion matrix per cell type</text>
  <rect class="box eval" x="435" y="930" width="270" height="105"/>
  <text class="label" x="570" y="962" text-anchor="middle">Latent PCA</text>
  <text class="text" x="465" y="993">Visualize AKI / CKD / Ref</text>
  <text class="small" x="465" y="1018">separation in latent space</text>
  <rect class="box bio" x="770" y="930" width="315" height="105"/>
  <text class="label" x="928" y="962" text-anchor="middle">Gradient x Input</text>
  <text class="text" x="800" y="993">Class-specific gene importance</text>
  <text class="small" x="800" y="1018">computed from trained classifier</text>
  <rect class="box bio" x="1150" y="930" width="315" height="105"/>
  <text class="label" x="1308" y="962" text-anchor="middle">Expression Direction</text>
  <text class="text" x="1180" y="993">target minus others mean</text>
  <text class="small" x="1180" y="1018">AKI, CKD, Ref mean expression</text>
  <rect class="box bio" x="1530" y="930" width="170" height="105"/>
  <text class="label" x="1615" y="962" text-anchor="middle">Rank Genes</text>
  <text class="mono" x="1615" y="993" text-anchor="middle">importance</text>
  <text class="mono" x="1615" y="1018" text-anchor="middle">x abs(diff)</text>
  <path class="arrow" d="M370 982 H435"/>
  <path class="arrow" d="M705 982 H770"/>
  <path class="arrow" d="M1085 982 H1150"/>
  <path class="arrow" d="M1465 982 H1530"/>

  <rect class="box out" x="140" y="1105" width="1520" height="65"/>
  <text class="label" x="900" y="1130" text-anchor="middle">Final Outputs</text>
  <text class="text" x="900" y="1158" text-anchor="middle">Per-cell-type trained models, HVG lists, training curves, confusion matrices, latent PCA plots, top biomarkers per class, ALL combined biomarker table, and FINAL compact biomarker table</text>

  <path class="dash" d="M1622 500 V560 H230 V650"/>
  <path class="dash" d="M1568 770 V850 H235 V930"/>
  <path class="dash" d="M1615 1035 V1105"/>

  <text class="small" x="900" y="1188" text-anchor="middle">Key idea: each cell type uses the same SDAE architecture, but has its own balanced cells, HVG set, trained weights, metrics, and biomarker rankings.</text>
</svg>
